<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 160">
  <defs>
    <radialGradient id="redGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
        gradientTransform="translate(87 80) scale(87 40)">
      <stop offset="0%"   stop-color="#ff0000" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ff0000" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#ff0000" stop-opacity="0.7"/>
      <stop offset="75%"  stop-color="#ff0000" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </linearGradient>
    <style>
      .title {
        fill: url(#titleGrad);
        stroke: #0d1117;
        stroke-width: 4;
        stroke-linejoin: round;
        paint-order: stroke fill;
      }
      .subtitle { fill: #808080; }
      @media (prefers-color-scheme: light) {
        .subtitle { fill: #505050; }
      }
    </style>
  </defs>

  <!-- Background glow -->
  <rect width="800" height="160" fill="url(#redGlow)"/>

  <!-- Card 1 — normal video -->
  <rect x="14" y="10" width="144" height="32" rx="4" fill="#1a1a2e" stroke="#2e3244" stroke-width="1"/>
  <rect x="16" y="12" width="140" height="26" rx="2" fill="#252840"/>
  <circle cx="88" cy="25" r="8" fill="#ff0000" opacity="0.75"/>
  <polygon points="85,21 85,29 93,25" fill="white"/>
  <rect x="16" y="46" width="88" height="2" rx="1" fill="#3a3f55"/>

  <!-- Card 2 — filtered (Shorts), faded and crossed out -->
  <rect x="14" y="56" width="144" height="32" rx="4" fill="#131323" stroke="#1e2030" stroke-width="1" opacity="0.55"/>
  <rect x="16" y="58" width="140" height="26" rx="2" fill="#181830" opacity="0.55"/>
  <rect x="18" y="61" width="33" height="10" rx="3" fill="#ff0033" opacity="0.55"/>
  <text x="34.5" y="70" font-size="7" text-anchor="middle" fill="white"
        font-family="-apple-system, 'Segoe UI', sans-serif" font-weight="700">SHORTS</text>
  <line x1="16"  y1="58" x2="156" y2="84" stroke="#ff4444" stroke-width="1.5" opacity="0.65"/>
  <line x1="156" y1="58" x2="16"  y2="84" stroke="#ff4444" stroke-width="1.5" opacity="0.65"/>
  <rect x="16" y="92" width="68" height="2" rx="1" fill="#252535" opacity="0.45"/>

  <!-- Card 3 — normal video -->
  <rect x="14" y="102" width="144" height="32" rx="4" fill="#1a1a2e" stroke="#2e3244" stroke-width="1"/>
  <rect x="16" y="104" width="140" height="26" rx="2" fill="#252840"/>
  <circle cx="88" cy="117" r="8" fill="#ff0000" opacity="0.75"/>
  <polygon points="85,113 85,121 93,117" fill="white"/>
  <rect x="16" y="138" width="100" height="2" rx="1" fill="#3a3f55"/>

  <!-- Accent divider — YouTube red -->
  <rect x="177" y="0" width="2" height="160" fill="url(#accentBar)" rx="1"/>

  <!-- Title -->
  <text class="title" x="202" y="75"
        font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="32" font-weight="700" letter-spacing="0.4">YouTube Sanitiser</text>

  <text class="subtitle" x="203" y="103"
        font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="16" letter-spacing="0.2">Hide Shorts, playlists, mixes, and low-view videos</text>
</svg>
